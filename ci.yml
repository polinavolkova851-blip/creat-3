name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Для Node.js проекта
      - name: Установка Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'  

      - name: Установка зависимостей
        run: npm install

      - name: Запуск тестов
        run: npm test
